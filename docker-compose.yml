services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
       KAFKA_NUM_PARTITIONS: 2

  redis:
  image: redis:7
  container_name: redis
  ports:
    - "6379:6379"
  volumes:
    - redis-data:/data
  command: redis-server --save 60 1 --appendonly yes


  response-service:
    build: ./services/response-service
    env_file:
      - ./services/response-service/.env
    ports:
      - "3000:3000"
    depends_on:
      - kafka

  aggregation-service:
    build: ./services/aggregation-service
    env_file:
      - ./services/aggregation-service/.env
    depends_on:
      - kafka
      - redis

  dashboard-service:
    build: ./services/dashboard-service
    env_file:
      - ./services/dashboard-service/.env
    ports:
      - "4000:4000"
    depends_on:
      - redis

  notification-service:
    build: ./services/notification-service
    env_file:
      - ./services/notification-service/.env
    depends_on:
      - kafka

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - response-service