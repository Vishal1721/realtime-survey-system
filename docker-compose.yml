services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_NUM_PARTITIONS: 2 
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

  redis:
    image: redis:7 
    container_name: redis  
    ports:
      - "6379:6379"  
    volumes:
      - redis-data:/data  
    command: redis-server --save 60 1 --appendonly yes  

  frontend:
    build: ./services/frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8080/api  
      - VITE_WS_URL=ws://localhost:4000         
    depends_on:
      - nginx
      - dashboard-service

  response-service:
    build: ./services/response-service
    env_file:
      - ./services/response-service/.env
    ports:
      - "3000:3000"
    depends_on:
      - kafka
    restart: always

  aggregation-service:
    build: ./services/aggregation-service
    env_file:
      - ./services/aggregation-service/.env
    depends_on:
      - kafka
      - redis
    restart: always
  dashboard-service:
    build: ./services/dashboard-service
    env_file:
      - ./services/dashboard-service/.env
    ports:
      - "4000:4000"
    depends_on:
      - redis
    restart: always
  notification-service:
    build: ./services/notification-service
    env_file:
      - ./services/notification-service/.env
    depends_on:
      - kafka
    restart: always
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - response-service

# Added this to ensure your redis data persists
volumes:
  redis-data:
